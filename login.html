<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bombinha OS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="login-page">

    <div class="login-card">
        <h2>Bombinha OS</h2>
        <p>Painel de Gerenciamento Local</p>
        
        <form id="formLogin">
            <div class="input-group">
                <input type="text" id="user" placeholder="Usuário" required autocomplete="username">
            </div>
            <div class="input-group">
                <input type="password" id="pass" placeholder="Senha" required autocomplete="current-password">
            </div>
            <button type="submit" id="btnEntrar">Entrar no Sistema</button>
        </form>
    </div>

    <script>
        document.getElementById('formLogin').onsubmit = async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            const btn = document.getElementById('btnEntrar');

            // Feedback visual de carregamento
            btn.disabled = true;
            btn.innerText = 'Autenticando...';

            try {
                // IMPORTANTE: O uso de '/' antes de 'api' garante que ele use a raiz do servidor
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    // Salva o Token de segurança no navegador
                    localStorage.setItem('token', data.token);
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Acesso Permitido!',
                        text: 'Redirecionando...',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'index.html';
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Falha no Login',
                        text: 'Usuário ou senha incorretos.',
                        confirmButtonColor: '#3498db'
                    });
                }
            } catch (err) {
                console.error("Erro na requisição:", err);
                Swal.fire({
                    icon: 'warning',
                    title: 'Servidor Offline',
                    text: 'Não foi possível conectar ao servidor. Verifique se o Node.js está rodando no Termux.',
                    confirmButtonColor: '#e67e22'
                });
            } finally {
                btn.disabled = false;
                btn.innerText = 'Entrar no Sistema';
            }
        };

        // Verifica se já está logado e redireciona para o painel
        if (localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
