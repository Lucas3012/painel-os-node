<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bombinha OS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="login-page">

    <div class="login-card">
        <h2>Bombinha OS</h2>
        <p>Acesse o Sistema de Gestão</p>
        
        <form id="formLogin">
            <div class="input-group">
                <input type="text" id="user" placeholder="Usuário" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="pass" placeholder="Senha" required autocomplete="off">
            </div>
            <button type="submit" id="btnEntrar">Entrar</button>
        </form>
    </div>

    <script>
        // Limpa o token antigo toda vez que a página de login carrega
        localStorage.removeItem('token');

        document.getElementById('formLogin').onsubmit = async (e) => {
            e.preventDefault();
            
            // Pega os valores dos inputs
            const userValue = document.getElementById('user').value.trim();
            const passValue = document.getElementById('pass').value.trim();
            const btn = document.getElementById('btnEntrar');

            // Feedback visual
            btn.disabled = true;
            btn.innerText = 'Verificando...';

            try {
                // O segredo está aqui: as chaves DEVEM ser username e password
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ 
                        username: userValue, 
                        password: passValue 
                    })
                });

                const data = await res.json();

                if (res.ok && data.auth) {
                    // Salva o token para as próximas requisições
                    localStorage.setItem('token', data.token);
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Sucesso!',
                        text: 'Acesso autorizado.',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'index.html';
                    });
                } else {
                    // Erro de credenciais
                    Swal.fire({
                        icon: 'error',
                        title: 'Erro no Login',
                        text: data.message || 'Usuário ou senha incorretos!',
                        confirmButtonColor: '#3498db'
                    });
                }
            } catch (err) {
                // Erro de conexão (Servidor desligado)
                console.error(err);
                Swal.fire({
                    icon: 'warning',
                    title: 'Falha na Conexão',
                    text: 'O servidor não respondeu. Verifique o Termux.',
                    confirmButtonColor: '#f39c12'
                });
            } finally {
                btn.disabled = false;
                btn.innerText = 'Entrar';
            }
        };
    </script>

</body>
</html>
