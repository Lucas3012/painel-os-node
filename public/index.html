<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bombinha OS - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container">
        <aside>
            <h2>Bombinha OS</h2>
            <nav>
                <ul>
                    <li class="active">Ordens de Serviço</li>
                    <li onclick="logout()">Sair</li>
                </ul>
            </nav>
        </aside>
        
        <main>
            <header>
                <h1>Gerenciamento de Ordens</h1>
                <button id="btnNovaOS" onclick="abrirModal()">+ Nova OS</button>
            </header>

            <section class="tabela-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Equipamento</th>
                            <th>Status</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo">
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Nova Ordem de Serviço</h3>
            <input type="text" id="cliente" placeholder="Nome do Cliente">
            <input type="text" id="equipamento" placeholder="Equipamento">
            <select id="status">
                <option value="Aberto">Aberto</option>
                <option value="Em Análise">Em Análise</option>
                <option value="Concluído">Concluído</option>
            </select>
            <div class="modal-buttons">
                <button onclick="salvarOS()" class="btn-confirm">Salvar</button>
                <button onclick="fecharModal()" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
