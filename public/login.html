<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bombinha OS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="login-page">
    <div class="login-card">
        <h2>Bombinha OS</h2>
        <form id="formLogin">
            <input type="text" id="user" placeholder="Usuário" required>
            <input type="password" id="pass" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
    </div>

    <script>
        document.getElementById('formLogin').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (data.auth) {
                    localStorage.setItem('token', data.token);
                    window.location.href = 'index.html';
                } else {
                    Swal.fire('Acesso Negado', 'Usuário ou senha inválidos.', 'error');
                }
            } catch (err) {
                Swal.fire('Erro', 'Servidor fora do ar.', 'error');
            }
        };
    </script>
</body>
</html>
